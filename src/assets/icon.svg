
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="mildGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <polygon points="256,24 464,144 464,368 256,488 48,368 48,144" fill="#1a1a1d" stroke="#00ff00" stroke-width="12" filter="url(#neonGlow)"/>
  
  <polygon points="256,50 440,156 440,356 256,462 72,356 72,156" fill="none" stroke="#6f42c1" stroke-width="4" filter="url(#mildGlow)"/>

  <path d="M160,280 C120,280 100,250 100,220 C100,180 140,160 170,170 C190,120 270,110 310,160 C350,150 400,180 390,240 C410,250 410,290 380,300 L160,300 Z" fill="none" stroke="#00ff00" stroke-width="14" stroke-linejoin="round" filter="url(#neonGlow)"/>

  <polygon points="280,210 210,320 260,320 230,410 320,290 270,290" fill="#00ff00" filter="url(#neonGlow)"/>

  <line x1="340" y1="130" x2="370" y2="100" stroke="#00ff00" stroke-width="10" stroke-linecap="round" filter="url(#mildGlow)"/>
  <line x1="390" y1="170" x2="430" y2="160" stroke="#00ff00" stroke-width="10" stroke-linecap="round" filter="url(#mildGlow)"/>
  <line x1="280" y1="100" x2="290" y2="60" stroke="#00ff00" stroke-width="10" stroke-linecap="round" filter="url(#mildGlow)"/>

  <text x="256" y="425" font-family="monospace, sans-serif" font-size="34" font-weight="bold" fill="#00ff00" text-anchor="middle" letter-spacing="6" filter="url(#neonGlow)">DOMENICO</text>
  <rect x="80" y="220" width="8" height="40" fill="#ff4444" filter="url(#mildGlow)"/>
  <rect x="94" y="220" width="4" height="40" fill="#ff4444" filter="url(#mildGlow)"/>
  <circle cx="256" cy="80" r="6" fill="#ff8800" filter="url(#mildGlow)"/>
  
  <path d="M400,320 L420,320 M410,310 L410,330" stroke="#00ff00" stroke-width="2"/>
